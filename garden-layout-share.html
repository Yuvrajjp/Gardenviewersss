<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smith Library Garden — Share View</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f2ea; color: #243321; }
    .card { max-width: 860px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(120px, 1fr)); gap: 10px; }
    .bed { background: #dce9ce; border: 1px solid #b4c59e; border-radius: 10px; padding: 10px; }
    .muted { color: #6f7668; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Smith Library Garden</h1>
    <p class="muted">Public share link (read-only). Updates automatically when admin saves.</p>
    <div id="layout" class="grid"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
    import { firebaseConfig, APP_PATHS } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const layoutNode = document.getElementById('layout');

    onSnapshot(doc(db, APP_PATHS.layoutDoc), (snap) => {
      const beds = snap.exists() ? snap.data().beds || [] : [];
      layoutNode.innerHTML = beds.map(b => `
        <div class="bed">
          <strong>Bed ${b.id}</strong><br />
          <span>${b.crop || 'Unassigned'}</span>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
